<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health – Lukas Koebis</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .health-intro {
      margin-top: 8px;
      font-size: 0.9375rem;
      color: #55534e;
    }
    .health-intro a {
      color: #37352f;
      text-decoration: underline;
      text-decoration-color: #d3d1cb;
      text-underline-offset: 2px;
      text-decoration-thickness: 1px;
      transition: text-decoration-color 0.15s;
    }
    .health-intro a:hover { text-decoration-color: #37352f; }

    .goals-table {
      width: 100%;
      border-collapse: collapse;
    }
    .goals-table tr {
      border-bottom: 1px solid #f1f1ef;
    }
    .goals-table tr:last-child { border-bottom: none; }
    .goals-table td {
      padding: 8px 0;
      font-size: 0.9375rem;
      color: #37352f;
    }
    .goals-table td:first-child {
      color: #b4b4b0;
      font-size: 0.8125rem;
      width: 100px;
    }
    .goals-table td:last-child {
      text-align: right;
      color: #b4b4b0;
      font-size: 0.8125rem;
    }
    .goals-table .current {
      color: #37352f;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.875rem;
    }
    .goals-table .goal {
      color: #b4b4b0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8125rem;
    }
  </style>
</head>
<body>
  <script src="nav.js"></script>

  <h1>Health</h1>
  <p class="health-intro">I'm into triathlons and track my training on <a href="https://strava.app.link/BMYM9b1ze1b" target="_blank">Strava</a>.</p>

  <section>
    <h2>Goals</h2>
    <table class="goals-table">
      <tr>
        <td>VO2max</td>
        <td class="current">48</td>
        <td class="goal">&rarr; 55</td>
      </tr>
      <tr>
        <td>RHR</td>
        <td class="current">52 bpm</td>
        <td class="goal">&rarr; 45 bpm</td>
      </tr>
      <tr>
        <td>Lean mass</td>
        <td class="current">77%</td>
        <td class="goal">&rarr; 82%</td>
      </tr>
    </table>
  </section>
</body>
</html>
