    .concert {
      padding: 10px 0;
      border-bottom: 1px solid #f1f1ef;
    }
    .concert:last-child { border-bottom: none; }

    .concert-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .concert-date {
      color: #b4b4b0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .concert-venue {
      color: #b4b4b0;
      font-size: 0.8125rem;
      white-space: nowrap;
    }

    .concert-pieces {
      list-style: none;
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .concert-piece {
      font-size: 0.9375rem;
      color: #55534e;
    }

    .concert-piece .composer {
      color: #37352f;
      font-weight: 500;
    }

    .concert-piece .artist {
      color: #b4b4b0;
      font-size: 0.8125rem;
    }

    @media (max-width: 520px) {
      .concert-header {
        flex-direction: column;
        gap: 2px;
      }
    }
  </style>

    // Sort most recent first
    concerts.sort((a, b) => b.date.localeCompare(a.date));

    // Format date
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    function fmtDate(iso) {
      const d = new Date(iso + 'T00:00:00');
      return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    // Render concerts
    const concertsEl = document.getElementById('concerts');

    concertsEl.innerHTML = concerts.map(c => {
      const pieces = c.pieces.map(p => {
        let label = p.composer
          ? `<span class="composer">${p.composer}</span> – ${p.work}`
          : p.work;
        if (p.artist) label += ` <span class="artist">(${p.artist})</span>`;
        return `<li class="concert-piece">${label}</li>`;
      }).join('');

      const venueLabel = c.url
        ? `<a class="concert-venue" href="${c.url}" target="_blank" rel="noopener noreferrer">${c.venue}</a>`
        : `<span class="concert-venue">${c.venue}</span>`;

      return `
    <div class="concert">
      <div class="concert-header">
        <span class="concert-date">${fmtDate(c.date)}</span>
        ${venueLabel}
      </div>
      <ul class="concert-pieces">${pieces}</ul>
    </div>`;
    }).join('');
