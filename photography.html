  <style>
    .album { margin-top: 56px; }
    .album:first-of-type { margin-top: 0; }

    .album-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
    }
    .album-header h2 {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #b4b4b0;
      margin: 0;
    }
    .album-date {
      font-size: 0.75rem;
      color: #d3d1cb;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }
    .photo-grid img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      cursor: pointer;
      border-radius: 2px;
      transition: opacity 0.12s;
    }
    .photo-grid img:hover { opacity: 0.85; }
    .photo-grid img.cover {
      grid-column: 1 / -1;
      aspect-ratio: 3/2;
    }

    .load-more {
      margin-top: 10px;
      background: #f7f7f5;
      border: none;
      color: #787774;
      font-size: 0.8125rem;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      border-radius: 4px;
      transition: background 0.12s, color 0.12s;
    }
    .load-more:hover { background: #f1f1ef; color: #37352f; }

    /* Lightbox */
    #lb {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #lb.open { display: flex; }
    #lb img {
      max-width: min(92vw, 900px);
      max-height: 90vh;
      object-fit: contain;
    }
    #lb-close {
      position: fixed;
      top: 20px; right: 24px;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0.7;
      background: none;
      border: none;
      line-height: 1;
    }
    #lb-close:hover { opacity: 1; }
    #lb-prev, #lb-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0.6;
      background: none;
      border: none;
      padding: 12px;
      line-height: 1;
    }
    #lb-prev:hover, #lb-next:hover { opacity: 1; }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }
  </style>

    const VISIBLE_ALBUMS = 6;

    // Render albums
    const albumsEl = document.getElementById('albums');

    function renderAlbum(a) {
      const imgs = a.photos.map((p, i) =>
        `<img src="img/${a.id}/${p}.jpg" alt="" loading="lazy"${i === 0 ? ' class="cover"' : ''}>`
      ).join('\n      ');

      return `
  <section class="album" id="${a.id}">
    <div class="album-header">
      <h2>${a.title}</h2>
      <span class="album-date">${a.date}</span>
    </div>
    <div class="photo-grid">
      ${imgs}
    </div>
  </section>`;
    }

    let visibleCount = VISIBLE_ALBUMS;

    function render() {
      const visible = albums.slice(0, visibleCount);
      albumsEl.innerHTML = visible.map(renderAlbum).join('\n');

      // Remove old load-more button
      const oldBtn = document.getElementById('load-more-albums');
      if (oldBtn) oldBtn.remove();

      if (visibleCount < albums.length) {
        const btn = document.createElement('button');
        btn.className = 'load-more';
        btn.id = 'load-more-albums';
        btn.textContent = `Load more (${albums.length - visibleCount} albums)`;
        btn.addEventListener('click', () => {
          visibleCount = Math.min(visibleCount + VISIBLE_ALBUMS, albums.length);
          render();
        });
        albumsEl.after(btn);
      }
    }

    render();

    // Lightbox
    const lb = document.getElementById('lb');
    const lbImg = document.getElementById('lb-img');
    let lbImgs = [], lbCur = 0;

    document.getElementById('albums').addEventListener('click', e => {
      if (e.target.tagName !== 'IMG') return;
      const grid = e.target.closest('.photo-grid');
      lbImgs = [...grid.querySelectorAll('img')].map(i => i.src);
      lbCur = lbImgs.indexOf(e.target.src);
      showLightbox(lbCur);
    });

    function showLightbox(i) {
      lbCur = (i + lbImgs.length) % lbImgs.length;
      lbImg.src = lbImgs[lbCur];
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function hideLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('lb-close').onclick = hideLightbox;
    document.getElementById('lb-prev').onclick = () => showLightbox(lbCur - 1);
    document.getElementById('lb-next').onclick = () => showLightbox(lbCur + 1);
    lb.addEventListener('click', e => { if (e.target === lb) hideLightbox(); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') hideLightbox();
      if (e.key === 'ArrowLeft') showLightbox(lbCur - 1);
      if (e.key === 'ArrowRight') showLightbox(lbCur + 1);
    });
